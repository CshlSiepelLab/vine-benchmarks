dtype: float64

tree_model:
  embed:
    space: lorentz     # euclid, lorentz
    dist_type: full # diag, full
    dim: 4       # 2
    q_dist:
      scale: 1e-1
    r_dist:
      scale: 1.
  linker: nj
  branch:
    q_dist:
      name: log_normal
      lscale: 0.
      lsigma: 0.
      gnn:
        #type: gcn
        type: edge
        n_layers: 2

lax_model:
  network: mlp
  scale_factor: 10
  last_bias: true

training:
  seed: 0
  num_threads: 1
  detect_anomaly: false
  max_steps: 100000
  check_interval: 1000
  device: cpu  # cpu
  mc_samples: 3 # 1
  use_iw_elbo: false #false
  use_loo: true #false
  use_lax: true #false
  use_anneal: true
  annealing:
    init: 0.001
    steps: 100_000
  optimizer:
    name: adam
    lr: 1.0e-3 #1.0e-4
    beta1: 0.9
    beta2: 0.999
    weight_decay: 0.0
    scheduler:
      name: step_lr
      step_size: 200_000
      gamma: 0.75
